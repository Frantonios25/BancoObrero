    <header>

        <h2>Urb. Jorge Hernandez</h2>

    <div class="container">
        <aside class="column left">
            <h3>Publicidad y Ubicación</h3>
            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d31298.59693314924!2d-70.21129962894656!3d11.69699117973914!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e85981724472263%3A0x72a07335a7532053!2sPunto%20Fijo%2C%20Falc%C3%B3n!5e0!3m2!1ses-419!2sve!4v1730379425123"

            <div class="gallery">
                <figure>
                    <img src="edificio.B.O.jpg" alt="Edificio Banco Obrero">

                </figure>
                <figure>
                    <img src="iglesia.B.O.jpg" alt="Iglesia Banco Obrero">
                    <figcaption>Iglesia</figcaption>
                </figure>
            </div>

            <section class="comments-section">
                <h3>Comentarios</h3>
                <form>
                    <input type="text" name="name" placeholder="Tu nombre" required>
                    <textarea name="comment" placeholder="Escribe tu comentario aquí..." required></textarea>
                    <button type="submit">Enviar Comentario</button>
                </form>
            </section>
        </main>

        <aside class="column right">
            <h3>Patrocinantes</h3>
            <p>(Espacio reservado para patrocinantes)</p>
        </aside>
    </div>
